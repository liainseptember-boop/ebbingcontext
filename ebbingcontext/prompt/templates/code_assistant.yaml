    importance: 0.9

  - content: "Always consider edge cases and error handling in code suggestions."
    source_type: system
    importance: 0.85

  - content: "When reviewing code, focus on correctness first, then performance."
    source_type: system
    importance: 0.8

  - content: "Explain the reasoning behind code suggestions, not just the code itself."
    source_type: system
    importance: 0.7

  - content: "Follow the existing code style and conventions of the project."
    source_type: system
    importance: 0.75
